<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lojinha da Ary</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="style.css">
  <link rel="icon" href="img/shopping-bag.png" type="image/png">
</head>

<body class="bg-gray-100 p-4 max-w-6xl mx-auto">

<div class="text-center mb-6">
  <img 
    src="img/IMG_ary.jpg" width="200px"
    class="mx-auto rounded-full mb-3" 
  />

  <h1 class="text-2xl font-bold">
    Lojinha da Ary 🛍
  </h1>

  <p class="text-gray-500 text-sm">
    Meus produtos favoritos ✨
  </p>
</div>

<input 
  id="search"
  placeholder="🔍 Buscar produto..."
  class="w-full p-3 mb-4 rounded-2xl border border-gray-200 focus:outline-none focus:ring-2 focus:ring-black"
/>

  <div id="categories" class="flex gap-2 overflow-x-auto mb-4"></div>

  <div id="products" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4"></div>


  <footer class="mt-10 py-6 text-center text-sm text-gray-500 border-t">
  <p>© <span id="year"></span> Lojinha da Ary</p>

  <p class="mt-1">
    All rights reserved · Developed by 
    <a target="_blank" class="font-medium text-gray-700 hover:underline">
      Soares
    </a>
  </p>
</footer>

  <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
  <script src="index.js">
  </script>


</body>
</html>
